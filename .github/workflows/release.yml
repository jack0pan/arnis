name: OEM Headless Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update. Defaults to oem-headless-<run number>."
        required: false
        type: string
      release_name:
        description: "Release title. Defaults to the release tag."
        required: false
        type: string
      prerelease:
        description: "Mark this GitHub Release as a prerelease."
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    if: github.ref == 'refs/heads/oem'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive: arnis-headless-linux-x86_64.tar.gz
            binary: arnis
          - target: aarch64-unknown-linux-gnu
            archive: arnis-headless-linux-aarch64.tar.gz
            binary: arnis

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-arnis-linux
        with:
          rust-targets: ${{ matrix.target }}
          gui-deps: "false"
          cache: "true"

      - name: Install cross
        run: cargo install cross --locked

      - name: Build headless binary
        run: cross build --release --no-default-features --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist/package
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/package/${{ matrix.binary }}
          if [ "${{ matrix.binary }}" = "arnis" ]; then
            chmod +x dist/package/${{ matrix.binary }}
          fi
          tar -czf dist/${{ matrix.archive }} -C dist/package ${{ matrix.binary }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Upload release assets
    if: github.ref == 'refs/heads/oem'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: release
        env:
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          RELEASE_NAME_INPUT: ${{ inputs.release_name }}
        run: |
          tag="$RELEASE_TAG_INPUT"
          if [ -z "$tag" ]; then
            tag="oem-headless-${GITHUB_RUN_NUMBER}"
          fi

          name="$RELEASE_NAME_INPUT"
          if [ -z "$name" ]; then
            name="$tag"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ inputs.prerelease }}
          make_latest: false
          files: dist/*.tar.gz
